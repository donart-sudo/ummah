<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ummah — Islamic Dua & Prayer Companion</title>
<meta name="description" content="A beautiful collection of authentic Islamic duas, surahs, and prayers with transliteration and translation.">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        emerald: { 950: '#064E3B', 900: '#0F3D3E', 800: '#115E4A', 700: '#167A5E' },
        gold: { 400: '#E8C872', 500: '#D4A843', 600: '#B8912E', 700: '#9A7620' },
        cream: { 50: '#FFFEF7', 100: '#FFF9E8', 200: '#FFF3D1' },
        night: { 900: '#1A1A2E', 800: '#16213E', 700: '#1E2A4A' }
      },
      fontFamily: {
        amiri: ['Amiri', 'serif'],
        body: ['Outfit', 'system-ui', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  /* Islamic geometric pattern */
  .islamic-pattern {
    background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23D4A84320' stroke-width='0.8'%3E%3Cpath d='M40 0L80 40L40 80L0 40Z'/%3E%3Cpath d='M40 10L70 40L40 70L10 40Z'/%3E%3Cpath d='M40 20L60 40L40 60L20 40Z'/%3E%3Ccircle cx='40' cy='40' r='8'/%3E%3Cpath d='M0 0L40 40M80 0L40 40M0 80L40 40M80 80L40 40'/%3E%3C/g%3E%3C/svg%3E");
  }
  .dark .islamic-pattern {
    background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23D4A84315' stroke-width='0.8'%3E%3Cpath d='M40 0L80 40L40 80L0 40Z'/%3E%3Cpath d='M40 10L70 40L40 70L10 40Z'/%3E%3Cpath d='M40 20L60 40L40 60L20 40Z'/%3E%3Ccircle cx='40' cy='40' r='8'/%3E%3Cpath d='M0 0L40 40M80 0L40 40M0 80L40 40M80 80L40 40'/%3E%3C/g%3E%3C/svg%3E");
  }

  /* Gold shimmer on header text */
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .gold-shimmer {
    background: linear-gradient(90deg, #D4A843 0%, #E8C872 25%, #FFFEF7 50%, #E8C872 75%, #D4A843 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s ease-in-out infinite;
  }
  .dark .gold-shimmer {
    background: linear-gradient(90deg, #D4A843 0%, #E8C872 25%, #FFF9E8 50%, #E8C872 75%, #D4A843 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Arabesque divider */
  .arabesque-divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, #D4A84360, #D4A843, #D4A84360, transparent);
  }

  /* Tab scroll */
  .tab-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .tab-scroll::-webkit-scrollbar { display: none; }

  /* Card enter animation */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-animate { animation: cardIn 0.4s ease-out both; }

  /* Subtle pulse for copy feedback */
  @keyframes copyPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .copy-pulse { animation: copyPulse 0.3s ease; }

  /* Star pattern for header */
  .star-border {
    background: repeating-linear-gradient(90deg, transparent 0px, transparent 12px, #D4A84340 12px, #D4A84340 13px);
  }

  /* Smooth transitions */
  * { transition-property: background-color, border-color, color, opacity; transition-duration: 0.2s; }

  /* Verse number ornament */
  .verse-num {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #064E3B, #0F3D3E);
    clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    display: flex; align-items: center; justify-content: center;
    color: #D4A843; font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .dark .verse-num {
    background: linear-gradient(135deg, #D4A843, #B8912E);
    color: #1A1A2E;
  }
</style>
</head>

<body class="bg-cream-50 dark:bg-night-900 font-body text-emerald-950 dark:text-cream-100 min-h-screen transition-colors duration-300"
  x-data="ummahApp()" x-init="init()">

<!-- ═══════════ HEADER ═══════════ -->
<header class="relative overflow-hidden">
  <!-- Geometric pattern overlay -->
  <div class="absolute inset-0 islamic-pattern opacity-60"></div>

  <!-- Top decorative border -->
  <div class="h-1 bg-gradient-to-r from-transparent via-gold-500 to-transparent"></div>

  <div class="relative z-10 px-4 pt-8 pb-6 text-center">
    <!-- Bismillah -->
    <p class="font-amiri text-gold-500 dark:text-gold-400 text-lg md:text-xl tracking-wide mb-2 opacity-90">
      &#65010;
    </p>
    <p class="font-amiri italic text-gold-600 dark:text-gold-400 text-sm md:text-base mb-6 opacity-75">
      Bismillahir Rahmanir Rahim
    </p>

    <!-- App Title -->
    <h1 class="font-amiri text-5xl md:text-6xl font-bold mb-2">
      <span class="gold-shimmer">Ummah</span>
    </h1>
    <p class="font-body text-sm md:text-base text-emerald-800 dark:text-cream-200 opacity-70 tracking-widest uppercase">
      Dua &amp; Prayer Companion
    </p>

    <!-- Dark mode toggle -->
    <button @click="toggleDark()" class="absolute top-6 right-4 w-10 h-10 rounded-full bg-white/60 dark:bg-white/10 backdrop-blur flex items-center justify-center hover:bg-white/80 dark:hover:bg-white/20 transition-all shadow-sm" aria-label="Toggle dark mode">
      <svg x-show="!darkMode" class="w-5 h-5 text-emerald-950" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      <svg x-show="darkMode" class="w-5 h-5 text-gold-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>

  <!-- Bottom decorative border -->
  <div class="arabesque-divider"></div>
</header>

<!-- ═══════════ SEARCH BAR ═══════════ -->
<div class="sticky top-0 z-30 bg-cream-50/90 dark:bg-night-900/90 backdrop-blur-lg border-b border-gold-500/10">
  <div class="max-w-6xl mx-auto px-4 py-3">
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-emerald-800/40 dark:text-cream-200/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" x-model="searchQuery" placeholder="Search duas, surahs, prayers..."
        class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white dark:bg-night-800 border border-emerald-950/10 dark:border-gold-500/15 text-sm focus:outline-none focus:ring-2 focus:ring-gold-500/40 placeholder:text-emerald-800/30 dark:placeholder:text-cream-200/30 font-body">
      <button x-show="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-1/2 -translate-y-1/2 text-emerald-800/40 hover:text-emerald-800/70 dark:text-cream-200/40">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- ═══════════ TAB NAVIGATION ═══════════ -->
  <div class="tab-scroll overflow-x-auto px-4 pb-3" x-ref="tabBar">
    <div class="flex gap-1.5 min-w-max max-w-6xl mx-auto">
      <template x-for="cat in categories" :key="cat.id">
        <button @click="setTab(cat.id)" :class="activeTab === cat.id
          ? 'bg-emerald-950 dark:bg-gold-500 text-white dark:text-night-900 shadow-lg shadow-emerald-950/20 dark:shadow-gold-500/20'
          : 'bg-white dark:bg-night-800 text-emerald-800 dark:text-cream-200 hover:bg-emerald-950/5 dark:hover:bg-gold-500/10'"
          class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-medium whitespace-nowrap transition-all duration-200">
          <span x-html="cat.icon" class="w-4 h-4 flex-shrink-0"></span>
          <span x-text="cat.label"></span>
          <span x-text="'(' + getCount(cat.id) + ')'" class="opacity-50 text-[10px]"></span>
        </button>
      </template>
    </div>
  </div>
</div>

<!-- ═══════════ CONTENT AREA ═══════════ -->
<main class="max-w-6xl mx-auto px-4 py-8">
  <!-- Category description -->
  <div class="mb-6">
    <h2 class="font-amiri text-2xl md:text-3xl text-emerald-950 dark:text-cream-100" x-text="currentCategory?.label"></h2>
    <p class="text-sm text-emerald-800/60 dark:text-cream-200/50 mt-1" x-text="currentCategory?.desc"></p>
  </div>

  <!-- Dua cards grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <template x-for="(dua, index) in filteredDuas" :key="dua.id">
      <div class="card-animate group relative bg-white dark:bg-night-800 rounded-2xl border border-emerald-950/5 dark:border-gold-500/10 shadow-sm hover:shadow-xl hover:shadow-emerald-950/5 dark:hover:shadow-gold-500/5 hover:-translate-y-0.5 transition-all duration-300 overflow-hidden"
           :style="'animation-delay:' + (index * 60) + 'ms'"
           :class="dua.type === 'surah' ? 'md:col-span-2 lg:col-span-3' : ''">

        <!-- Card top accent -->
        <div class="h-0.5 bg-gradient-to-r from-emerald-950/20 via-gold-500/60 to-emerald-950/20 dark:from-gold-500/10 dark:via-gold-500/40 dark:to-gold-500/10"></div>

        <div class="p-5 md:p-6">
          <!-- Header row -->
          <div class="flex items-start justify-between gap-3 mb-4">
            <div>
              <h3 class="font-amiri text-lg md:text-xl font-bold text-emerald-950 dark:text-cream-100 leading-tight" x-text="dua.title"></h3>
              <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-emerald-950/5 dark:bg-gold-500/10 text-[10px] font-medium text-emerald-800 dark:text-gold-400 uppercase tracking-wider" x-text="dua.source"></span>
                <template x-if="dua.status">
                  <span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-medium uppercase tracking-wider"
                    :class="dua.status === 'Sahih' ? 'bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-400' : dua.status === 'Hasan' ? 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-400' : 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-400'"
                    x-text="dua.status"></span>
                </template>
              </div>
            </div>
            <!-- Copy button -->
            <button @click="copyDua(dua, $event)" class="flex-shrink-0 w-9 h-9 rounded-xl bg-emerald-950/5 dark:bg-gold-500/10 flex items-center justify-center hover:bg-emerald-950/10 dark:hover:bg-gold-500/20 transition-colors" :title="'Copy ' + dua.title">
              <svg class="w-4 h-4 text-emerald-800/50 dark:text-gold-400/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </button>
          </div>

          <!-- Regular dua display -->
          <template x-if="dua.type !== 'surah' && dua.type !== 'laylatul'">
            <div>
              <!-- Transliteration -->
              <div class="mb-4" x-show="dua.arabic">
                <p class="font-amiri italic text-base md:text-lg leading-relaxed text-emerald-800 dark:text-gold-400" x-text="dua.arabic"></p>
              </div>

              <!-- Divider -->
              <div class="arabesque-divider mb-4" x-show="dua.arabic"></div>

              <!-- Translation -->
              <p class="text-sm leading-relaxed text-emerald-950/70 dark:text-cream-200/70" x-text="dua.translation"></p>
            </div>
          </template>

          <!-- Surah display (expandable) -->
          <template x-if="dua.type === 'surah'">
            <div x-data="{ expanded: false }">
              <div class="flex items-center gap-2 mb-3">
                <span class="text-sm text-emerald-800/60 dark:text-cream-200/50" x-text="dua.ayahs.length + ' verses'"></span>
                <span class="text-emerald-800/30 dark:text-cream-200/20">|</span>
                <span class="text-sm text-emerald-800/60 dark:text-cream-200/50" x-text="dua.translation"></span>
              </div>

              <!-- First 3 verses always visible -->
              <div class="space-y-4 mb-4">
                <template x-for="ayah in (expanded ? dua.ayahs : dua.ayahs.slice(0, 3))" :key="ayah.num">
                  <div class="flex gap-3 items-start">
                    <div class="verse-num mt-0.5">
                      <span x-text="ayah.num"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                      <p class="font-amiri italic text-sm md:text-base leading-relaxed text-emerald-800 dark:text-gold-400 mb-1" x-text="ayah.arabic"></p>
                      <p class="text-xs leading-relaxed text-emerald-950/50 dark:text-cream-200/50" x-text="ayah.translation"></p>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Expand button -->
              <button @click="expanded = !expanded"
                class="w-full py-2.5 rounded-xl border border-dashed border-emerald-950/15 dark:border-gold-500/20 text-xs font-medium text-emerald-800/60 dark:text-gold-400/60 hover:bg-emerald-950/5 dark:hover:bg-gold-500/10 transition-colors flex items-center justify-center gap-2">
                <span x-text="expanded ? 'Show Less' : 'Show All ' + dua.ayahs.length + ' Verses'"></span>
                <svg :class="expanded ? 'rotate-180' : ''" class="w-3 h-3 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
              </button>
            </div>
          </template>

          <!-- Laylatul Qadr display -->
          <template x-if="dua.type === 'laylatul'">
            <div>
              <div class="flex items-center gap-2 mb-4">
                <span class="px-2 py-0.5 rounded-md bg-purple-100 dark:bg-purple-900/30 text-[10px] font-medium text-purple-800 dark:text-purple-400 uppercase tracking-wider">Albanian Prayers</span>
                <span class="text-sm text-emerald-800/60 dark:text-cream-200/50" x-text="dua.content.length + ' prayers'"></span>
              </div>
              <div class="space-y-3 max-h-[500px] overflow-y-auto pr-2" style="scrollbar-width: thin;">
                <template x-for="(prayer, i) in dua.content" :key="i">
                  <div class="flex gap-3 items-start">
                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-950/5 dark:bg-gold-500/10 flex items-center justify-center text-[10px] font-semibold text-emerald-800/50 dark:text-gold-400/50 mt-0.5" x-text="i + 1"></span>
                    <p class="text-sm leading-relaxed text-emerald-950/70 dark:text-cream-200/70" x-text="prayer"></p>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Note -->
          <template x-if="dua.note">
            <p class="mt-4 text-xs italic text-gold-600 dark:text-gold-400/60 flex items-start gap-1.5">
              <svg class="w-3.5 h-3.5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <span x-text="dua.note"></span>
            </p>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- Empty state -->
  <div x-show="filteredDuas.length === 0" class="text-center py-20">
    <div class="w-16 h-16 rounded-full bg-emerald-950/5 dark:bg-gold-500/10 flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-emerald-800/30 dark:text-gold-400/30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </div>
    <p class="text-emerald-800/40 dark:text-cream-200/40 text-sm">No duas found matching your search.</p>
  </div>

  <!-- Copy toast -->
  <div x-show="showToast" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 bg-emerald-950 dark:bg-gold-500 text-white dark:text-night-900 rounded-xl text-sm font-medium shadow-xl">
    Copied to clipboard
  </div>
</main>

<!-- ═══════════ FOOTER ═══════════ -->
<footer class="mt-12 pb-8">
  <div class="arabesque-divider mb-8"></div>
  <div class="text-center">
    <p class="font-amiri text-gold-500 dark:text-gold-400 text-lg mb-1">&#65010;</p>
    <p class="text-xs text-emerald-800/40 dark:text-cream-200/30 tracking-wider uppercase">Built with love for the Ummah</p>
    <p class="text-[10px] text-emerald-800/20 dark:text-cream-200/15 mt-2">All duas verified from authentic sources — Quran, Sahih al-Bukhari, Sahih Muslim, and other reliable collections.</p>
  </div>
</footer>

<script>
function ummahApp() {
  return {
    darkMode: false,
    activeTab: 'morning',
    searchQuery: '',
    showToast: false,

    categories: [
      { id: 'morning', label: 'Morning Duas', desc: 'Start your day with remembrance of Allah. Recite these after Fajr prayer.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M12 3v1m0 16v1m-9-9H2m20 0h-1m-2.636-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707"/><circle cx="12" cy="12" r="4"/></svg>' },
      { id: 'night', label: 'Night Duas', desc: 'Protect yourself before sleep with these evening adhkar and supplications.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>' },
      { id: 'travel', label: 'Travel', desc: 'Seek Allah\'s protection and ease when embarking on a journey.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>' },
      { id: 'protection', label: 'Protection', desc: 'Shield yourself with these powerful duas for safety and divine protection.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' },
      { id: 'wealth', label: 'Wealth & Rizq', desc: 'Ask Allah for halal sustenance, guidance, and self-sufficiency.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M8 10h8M9 14h6"/></svg>' },
      { id: 'mental', label: 'Mental Health', desc: 'Find peace and relief from worry, grief, and anxiety through these supplications.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>' },
      { id: 'surahs', label: 'Surahs', desc: 'Complete surahs and powerful Quranic verses for daily recitation.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>' },
      { id: 'salah', label: 'Salah', desc: 'Essential recitations for your daily prayers — Tashahhud, Salawat, and Quranic duas.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>' },
      { id: 'special', label: 'Special', desc: 'Prayers for Laylatul Qadr, Ramadan, and other blessed occasions.', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>' }
    ],

    duas: [
      // ═══ MORNING ═══
      {
        id: 1, title: 'Morning Dhikr — Tawheed', category: 'morning', tags: ['morning'],
        arabic: 'La ilaha illallahu wahdahu la sharika lah, lahul-mulku wa lahul-hamdu, wa Huwa \'ala kulli shay\'in Qadir.',

        ayahs: [
          { num: 1, arabic: 'Tabarakal-ladhi biyadihil-mulku wa Huwa \'ala kulli shay\'in Qadir.', translation: 'Blessed is He in Whose Hand is the dominion, and He is Able to do all things.' },
          { num: 2, arabic: 'Alladhi khalaqal-mawta wal-hayata liyabluwakum ayyukum ahsanu \'amala, wa Huwal-\'Azizul-Ghafur.', translation: 'He Who created death and life to test which of you is best in deed, and He is the Almighty, the Oft-Forgiving.' },
          { num: 3, arabic: 'Alladhi khalaqa sab\'a samawatin tibaqan, ma tara fi khalqir-Rahmani min tafawut, farji\'il-basara hal tara min futur.', translation: 'He Who created seven heavens in layers. You do not see in the creation of the Most Merciful any inconsistency. So return your vision; do you see any breaks?' },
          { num: 4, arabic: 'Thummarji\'il-basara karratayn yanqalib ilaykal-basaru khasi\'an wa huwa hasir.', translation: 'Then return your vision twice again. Your vision will return to you humbled while it is fatigued.' },
          { num: 5, arabic: 'Walaqad zayyanas-sama\'ad-dunya bimasabiha wa ja\'alnaha rujuman lish-shayatin, wa a\'tadna lahum \'adhaba as-sa\'ir.', translation: 'And We have certainly beautified the nearest heaven with stars and have made them as missiles to drive away the devils, and have prepared for them the punishment of the Blaze.' },
          { num: 6, arabic: 'Walladhina kafaru birabbihim \'adhabu Jahannama wa bi\'sal-masir.', translation: 'And for those who disbelieved in their Lord is the punishment of Hell, and wretched is the destination.' },
          { num: 7, arabic: 'Idha ulqu fiha sami\'u laha shahiqan wa hiya tafur.', translation: 'When they are thrown into it, they hear from it a dreadful inhaling while it boils up.' },
          { num: 8, arabic: 'Takadu tamayyazu minal-ghayz, kullama ulqiya fiha fawjun sa\'alahum khazanatuha alam ya\'tikum nadhir.', translation: 'It almost bursts with rage. Every time a group is thrown into it, its keepers ask them: Did there not come to you a warner?' },
          { num: 9, arabic: 'Qalu bala qad ja\'ana nadhirun fakadh-dhabna wa qulna ma nazzalallahu min shay\', in antum illa fi dalalin kabir.', translation: 'They will say: Yes, a warner had come to us, but we denied and said: Allah has not sent down anything. You are not but in great error.' },
          { num: 10, arabic: 'Waqalu law kunna nasma\'u aw na\'qilu ma kunna fi as-habis-sa\'ir.', translation: 'And they will say: If only we had been listening or reasoning, we would not be among the companions of the Blaze.' },
          { num: 11, arabic: 'Fa\'tarafu bidhanbihim fa-suhqan li-as-habis-sa\'ir.', translation: 'And they will admit their sin, so away with the companions of the Blaze.' },
          { num: 12, arabic: 'Innal-ladhina yakhshawna Rabbahum bil-ghaybi lahum maghfiratun wa ajrun kabir.', translation: 'Indeed, those who fear their Lord unseen will have forgiveness and great reward.' },
          { num: 13, arabic: 'Wa asirru qawlakum awijharu bih, innahu \'Alimun bidhatis-sudur.', translation: 'And conceal your speech or publicize it; indeed, He is Knowing of that within the breasts.' },
          { num: 14, arabic: 'Ala ya\'lamu man khalaq? Wa Huwal-Latiful-Khabir.', translation: 'Does He who created not know, while He is the Subtle, the Acquainted?' },
          { num: 15, arabic: 'Huwal-ladhi ja\'ala lakumul-arda dhalulan famshuu fi manakibiha wa kulu mir rizqih, wa ilayhin-nushur.', translation: 'It is He who made the earth tame for you, so walk among its slopes and eat of His provision, and to Him is the resurrection.' },
          { num: 16, arabic: 'A-amintum man fis-sama\'i an yakhsifa bikumul-arda fa-idha hiya tamur.', translation: 'Do you feel secure that He who is above would not cause the earth to swallow you as it shakes?' },
          { num: 17, arabic: 'Am amintum man fis-sama\'i an yursila \'alaykum hasiban, fasata\'lamuna kayfa nadhir.', translation: 'Or do you feel secure that He who is above would not send against you a storm of stones? Then you would know how My warning was.' },

          { num: 20, arabic: 'Amman hadhal-ladhi huwa jundun lakum yansurakum min dunir-Rahman? Inil-kafirun illa fi ghurur.', translation: 'Or who is it that could be an army for you to aid you other than the Most Merciful? The disbelievers are not but in delusion.' },
          { num: 21, arabic: 'Amman hadhal-ladhi yarzuqukum in amsaka rizqah, bal lajju fi \'utuwwin wa nufur.', translation: 'Or who is it that could provide for you if He withheld His provision? But they have persisted in insolence and aversion.' },
          { num: 22, arabic: 'Afaman yamshi mukibban \'ala wajhihi ahda amman yamshi sawiyyan \'ala siratim mustaqim.', translation: 'Then is one who walks fallen on his face better guided or one who walks erect on a straight path?' },

          { num: 25, arabic: 'Wayaquluna mata hadhal-wa\'du in kuntum sadiqin.', translation: 'And they say: When is this promise, if you should be truthful?' },
          { num: 26, arabic: 'Qul innamal-\'ilmu \'indallahi wa innama ana nadhirun mubin.', translation: 'Say: The knowledge is only with Allah, and I am only a clear warner.' },
          { num: 27, arabic: 'Falamma ra\'awhu zulfatan si\'at wujuhul-ladhina kafaru wa qila hadhal-ladhi kuntum bihi tadda\'un.', translation: 'But when they see it approaching, the faces of those who disbelieved will be distressed, and it will be said: This is that for which you used to call.' },

          { num: 30, arabic: 'Qul ara\'aytum in asbaha ma\'ukum ghawran faman ya\'tikum bima\'in ma\'in.', translation: 'Say: Have you considered if your water was to become sunken, then who could bring you flowing water?' }

    get currentCategory() {
      return this.categories.find(c => c.id === this.activeTab);
    },

    get filteredDuas() {
      let results = this.duas.filter(d =>
        d.category === this.activeTab || (d.tags && d.tags.includes(this.activeTab))
      );

      if (this.searchQuery.trim()) {
        const q = this.searchQuery.toLowerCase().trim();
        results = this.duas.filter(d => {
          const searchFields = [
            d.title, d.arabic, d.translation, d.source, d.note
          ].filter(Boolean).join(' ').toLowerCase();

          if (d.content) {
            return searchFields.includes(q) || d.content.some(c => c.toLowerCase().includes(q));
          }
          if (d.ayahs) {
            return searchFields.includes(q) || d.ayahs.some(a =>
              a.arabic.toLowerCase().includes(q) || a.translation.toLowerCase().includes(q)
            );
          }
          return searchFields.includes(q);
        });
      }

      return results;
    },

    init() {
      this.darkMode = localStorage.getItem('ummah-dark') === 'true';
      if (this.darkMode) document.documentElement.classList.add('dark');

      const saved = localStorage.getItem('ummah-tab');
      if (saved && this.categories.some(c => c.id === saved)) {
        this.activeTab = saved;
      }
    },

    toggleDark() {
      this.darkMode = !this.darkMode;
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('ummah-dark', this.darkMode);
    },

    setTab(id) {
      this.activeTab = id;
      this.searchQuery = '';
      localStorage.setItem('ummah-tab', id);

      this.$nextTick(() => {
        const btn = this.$refs.tabBar?.querySelector(`button[class*="shadow-lg"]`);
        if (btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });
    },

    getCount(catId) {
      return this.duas.filter(d => d.category === catId || (d.tags && d.tags.includes(catId))).length;
    },

    async copyDua(dua, event) {
      let text = dua.title + '\n\n';
      if (dua.arabic) text += dua.arabic + '\n\n';
      if (dua.translation) text += dua.translation + '\n\n';
      if (dua.ayahs) {
        dua.ayahs.forEach(a => {
          text += a.num + '. ' + a.arabic + '\n' + a.translation + '\n\n';
        });
      }
      if (dua.content) {
        dua.content.forEach((c, i) => {
          text += (i + 1) + '. ' + c + '\n';
        });
      }
      text += '\n— ' + dua.source;

      try {
        await navigator.clipboard.writeText(text);
        const btn = event.currentTarget;
        btn.classList.add('copy-pulse');
        setTimeout(() => btn.classList.remove('copy-pulse'), 300);

        this.showToast = true;
        setTimeout(() => this.showToast = false, 2000);
      } catch (e) {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        this.showToast = true;
        setTimeout(() => this.showToast = false, 2000);
      }
    }
  };
}
</script>
